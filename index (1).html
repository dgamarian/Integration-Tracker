<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetSuite Go-Live Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f7f5; --surface: #ffffff; --surface2: #f0efec; --border: #e2e1dc; --border2: #d0cfc9;
    --text: #1a1a18; --text2: #6b6a65; --text3: #9b9a95;
    --green: #1a8a65; --green-bg: #e6f5f0; --green-border: #b2ddd0;
    --blue: #185fa5; --blue-bg: #e6f1fb;
    --red: #c0392b; --red-bg: #fdf0ee;
    --amber: #b35c00; --amber-bg: #fef3e2;
    --purple: #6b38b2; --purple-bg: #f0e8fb;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 360px; max-width: 95vw; text-align: center; }
  .login-icon { width: 48px; height: 48px; background: var(--green); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 16px; }
  .login-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; }
  .login-card input[type=password] { width: 100%; height: 42px; padding: 0 14px; border: 1px solid var(--border2); border-radius: 10px; font-size: 14px; outline: none; background: var(--surface); color: var(--text); margin-bottom: 12px; letter-spacing: .1em; }
  .login-card input[type=password]:focus { border-color: var(--green); }
  .login-btn { width: 100%; height: 42px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .login-btn:hover { background: #156e50; }
  .login-error { font-size: 12px; color: var(--red); margin-top: 10px; min-height: 18px; }

  /* APP */
  #app-screen { display: none; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 50; }
  .topbar-inner { display: flex; align-items: center; justify-content: space-between; height: 56px; max-width: 1400px; margin: 0 auto; gap: 12px; flex-wrap: wrap; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; color: var(--text); }
  .logo-icon { width: 30px; height: 30px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; flex-shrink: 0; }
  .live-pill { display: flex; align-items: center; gap: 6px; background: var(--green-bg); border: 1px solid var(--green-border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--green); font-weight: 500; }
  .live-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .sync-info { font-size: 11px; color: var(--text3); }
  .refresh-btn { height: 30px; padding: 0 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; font-size: 12px; color: var(--text2); cursor: pointer; }
  .refresh-btn:hover { background: var(--surface2); }

  .page { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 5px; }
  .kpi-value { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
  .kpi-sub { font-size: 11px; color: var(--text3); }
  .kv-green { color: var(--green); } .kv-blue { color: var(--blue); } .kv-red { color: var(--red); } .kv-amber { color: var(--amber); }

  .prog-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
  .prog-hdr { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .prog-title { font-size: 13px; font-weight: 600; }
  .prog-pct { font-size: 13px; font-weight: 600; color: var(--green); }
  .prog-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 8px; background: var(--green); border-radius: 4px; transition: width .5s; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 260px; }
  .search-wrap input { width: 100%; padding: 0 10px 0 30px; height: 34px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 13px; outline: none; }
  .search-wrap input:focus { border-color: var(--green); }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; }
  select { height: 34px; padding: 0 10px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 13px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--green); }
  .view-toggle { display: flex; border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; margin-left: auto; }
  .vbtn { padding: 0 14px; height: 34px; background: var(--surface); border: none; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; border-right: 1px solid var(--border2); display: flex; align-items: center; gap: 5px; }
  .vbtn:last-child { border-right: none; }
  .vbtn.active { background: var(--surface2); color: var(--text); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl thead th { padding: 9px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); background: var(--surface2); border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
  .tbl tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  .tbl tbody tr:last-child { border-bottom: none; }
  .tbl tbody tr:hover { background: var(--bg); }
  .tbl td { padding: 8px 14px; font-size: 13px; vertical-align: middle; }
  .td-id { color: var(--text3); font-size: 11px; width: 34px; }
  .td-task { max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-date { white-space: nowrap; font-size: 12px; color: var(--text2); }
  .grp-row td { background: var(--surface2); font-size: 12px; font-weight: 600; color: var(--text2); padding: 6px 14px; cursor: pointer; }
  .grp-row:hover td { background: #e8e7e2; }
  .grp-inner { display: flex; align-items: center; gap: 7px; }
  .chev { font-size: 10px; transition: transform .15s; display: inline-block; }
  .chev.col { transform: rotate(-90deg); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .b-not { background: var(--blue-bg); color: var(--blue); }
  .b-in { background: var(--amber-bg); color: var(--amber); }
  .b-done { background: var(--green-bg); color: var(--green); }
  .b-over { background: var(--red-bg); color: var(--red); }
  .pbar { width: 56px; height: 4px; background: var(--surface2); border-radius: 2px; display: inline-block; vertical-align: middle; margin-right: 4px; overflow: hidden; }
  .pfill { height: 4px; background: var(--green); border-radius: 2px; }
  .av { width: 22px; height: 22px; border-radius: 50%; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; margin-right: 4px; vertical-align: middle; }
  .av-d { background: var(--blue-bg); color: var(--blue); }
  .av-j { background: var(--purple-bg); color: var(--purple); }

  .gantt-wrap { overflow-x: auto; }
  .gt { width: 100%; border-collapse: collapse; min-width: 600px; }
  .gt th { padding: 9px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); background: var(--surface2); border-bottom: 1px solid var(--border); text-align: left; }
  .gt td { padding: 5px 12px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: middle; }
  .gt tr:hover td { background: var(--bg); cursor: pointer; }
  .gtrack { background: var(--surface2); border-radius: 3px; height: 14px; position: relative; overflow: hidden; min-width: 300px; }
  .gbar { height: 14px; border-radius: 3px; position: absolute; top: 0; min-width: 2px; }
  .g-not { background: #b5d4f4; } .g-in { background: #fac775; } .g-done { background: #9fe1cb; } .g-over { background: #f7c1c1; }
  .g-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); opacity: .7; z-index: 2; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 24px; width: 480px; max-width: 95vw; max-height: 85vh; overflow-y: auto; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text3); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
  .modal-close:hover { background: var(--surface2); }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; padding-right: 30px; }
  .modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); margin-bottom: 5px; }
  .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
  .field select:focus, .field textarea:focus { border-color: var(--green); }
  .field textarea { min-height: 72px; resize: vertical; line-height: 1.5; }
  .range-wrap { display: flex; align-items: center; gap: 10px; }
  .range-wrap input[type=range] { flex: 1; accent-color: var(--green); }
  .range-val { font-size: 13px; font-weight: 600; color: var(--green); min-width: 36px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-save { flex: 1; height: 38px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-save:hover { background: #156e50; }
  .btn-save:disabled { opacity: .6; cursor: not-allowed; }
  .btn-cancel { height: 38px; padding: 0 16px; background: var(--surface); color: var(--text2); border: 1px solid var(--border2); border-radius: 8px; font-size: 13px; cursor: pointer; }
  .btn-cancel:hover { background: var(--surface2); }
  .save-status { font-size: 12px; margin-top: 8px; min-height: 18px; color: var(--green); }
  .save-status.err { color: var(--red); }
  .empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

  @media (max-width: 640px) {
    .page { padding: 12px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .td-date { display: none; }
  }
</style>
</head>

let tasks = [], collapsed = {}, currentView = 'list';

const api = async (method, path, body) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : '' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return method === 'GET' ? res.json() : res;
};

async function loadAll() {
  document.getElementById('sync-info').textContent = 'Syncing…';
  try {
    const saved = await api('GET', 'tasks?select=id,status,pct,notes');
    const map = {};
    saved.forEach(r => map[r.id] = r);
    tasks = RAW.map(r => ({ ...r, status: map[r.id]?.status || 'Not Started', pct: map[r.id]?.pct || 0, notes: map[r.id]?.notes || '' }));
    document.getElementById('sync-info').textContent = 'Synced ' + new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    tasks = RAW.map(r => ({ ...r, status: 'Not Started', pct: 0, notes: '' }));
    document.getElementById('sync-info').textContent = 'Could not connect to database';
  }
  initFilters();
  render();
}

async function saveTask(id, status, pct, notes) {
  document.getElementById('save-status').textContent = 'Saving…';
  document.getElementById('save-status').className = 'save-status';
  document.getElementById('btn-save').disabled = true;
  try {
    await api('POST', 'tasks', { id, status, pct, notes });
    const t = tasks.find(x => x.id === id);
    t.status = status; t.pct = pct; t.notes = notes;
    document.getElementById('save-status').textContent = '✓ Saved — everyone will see this update';
    document.getElementById('sync-info').textContent = 'Synced ' + new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
    setTimeout(() => closeModal(), 1200);
  } catch(e) {
    document.getElementById('save-status').textContent = 'Error saving. Check your connection.';
    document.getElementById('save-status').className = 'save-status err';
  }
  document.getElementById('btn-save').disabled = false;
}

function initFilters() {
  const gs = document.getElementById('fg'), os = document.getElementById('fo');
  if (gs.options.length > 1) return;
  [...new Set(RAW.map(t => t.group))].forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; gs.appendChild(o); });
  [...new Set(RAW.map(t => t.owner))].forEach(o => { const el = document.createElement('option'); el.value = o; el.textContent = o; os.appendChild(el); });
}

function isOver(t) { return t.status !== 'Complete' && new Date(t.end) < TODAY; }
function effStatus(t) { if (t.status === 'Complete') return 'Complete'; if (isOver(t)) return 'Overdue'; return t.status; }
function fmt(d) { return d ? new Date(d).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: '2-digit' }) : '—'; }
function bc(s) { return s === 'Complete' ? 'b-done' : s === 'In Progress' ? 'b-in' : s === 'Overdue' ? 'b-over' : 'b-not'; }

function renderKPIs() {
  const total = tasks.length, done = tasks.filter(t => t.status === 'Complete').length;
  const prog = tasks.filter(t => t.status === 'In Progress').length;
  const over = tasks.filter(t => isOver(t) && t.status !== 'Complete').length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('opct').textContent = pct + '%';
  document.getElementById('obar').style.width = pct + '%';
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-label">Total tasks</div><div class="kpi-value">${total}</div><div class="kpi-sub">across all groups</div></div>
    <div class="kpi"><div class="kpi-label">Complete</div><div class="kpi-value kv-green">${done}</div><div class="kpi-sub">${pct}% done</div></div>
    <div class="kpi"><div class="kpi-label">In progress</div><div class="kpi-value kv-blue">${prog}</div><div class="kpi-sub">active now</div></div>
    <div class="kpi"><div class="kpi-label">Not started</div><div class="kpi-value">${tasks.filter(t => t.status === 'Not Started' && !isOver(t)).length}</div><div class="kpi-sub">upcoming</div></div>
    <div class="kpi"><div class="kpi-label">Overdue</div><div class="kpi-value kv-red">${over}</div><div class="kpi-sub">need attention</div></div>
    <div class="kpi"><div class="kpi-label">Days to go-live</div><div class="kpi-value kv-amber">${Math.round((GOLIVE - TODAY) / 86400000)}</div><div class="kpi-sub">Jan 6, 2028</div></div>
  `;
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const fg = document.getElementById('fg').value, fo = document.getElementById('fo').value, fs = document.getElementById('fs').value;
  return tasks.filter(t => {
    if (q && !t.task.toLowerCase().includes(q) && !t.group.toLowerCase().includes(q)) return false;
    if (fg && t.group !== fg) return false;
    if (fo && t.owner !== fo) return false;
    if (fs === 'Overdue') return isOver(t);
    if (fs && effStatus(t) !== fs) return false;
    return true;
  });
}

function renderList() {
  const f = getFiltered();
  if (!f.length) { document.getElementById('list-view').innerHTML = '<div class="empty">No tasks match your filters.</div>'; return; }
  const byG = {};
  f.forEach(t => { if (!byG[t.group]) byG[t.group] = []; byG[t.group].push(t); });
  let h = `<table class="tbl"><thead><tr><th style="width:34px">#</th><th>Task</th><th>Owner</th><th>Start</th><th>End</th><th>Status</th><th>Progress</th></tr></thead><tbody>`;
  for (const [g, gt] of Object.entries(byG)) {
    const col = collapsed[g], dn = gt.filter(t => t.status === 'Complete').length;
    h += `<tr class="grp-row" onclick="toggleG('${g.replace(/'/g,"\\'")}')"><td colspan="7"><div class="grp-inner"><span class="chev ${col ? 'col' : ''}">▼</span>${g}<span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:4px">${dn}/${gt.length}</span></div></td></tr>`;
    if (!col) gt.forEach(t => {
      const es = effStatus(t), avc = t.owner === 'Diana' ? 'av-d' : 'av-j';
      h += `<tr onclick="openTask(${t.id})"><td class="td-id">${t.id}</td><td class="td-task">${t.task}</td><td><span class="av ${avc}">${t.owner[0]}</span>${t.owner}</td><td class="td-date">${fmt(t.start)}</td><td class="td-date">${fmt(t.end)}</td><td><span class="badge ${bc(es)}">${es}</span></td><td><span class="pbar"><span class="pfill" style="width:${t.pct}%"></span></span>${t.pct}%</td></tr>`;
    });
  }
  document.getElementById('list-view').innerHTML = h + '</tbody></table>';
}

function renderGantt() {
  const f = getFiltered().slice(0, 100);
  if (!f.length) { document.getElementById('gantt-view').innerHTML = '<div class="empty">No tasks match.</div>'; return; }
  const allD = f.flatMap(t => [new Date(t.start), new Date(t.end)]).filter(d => !isNaN(d));
  const minD = new Date(Math.min(...allD)), maxD = new Date(Math.max(...allD));
  const span = Math.max(1, maxD - minD);
  const tp = Math.min(100, Math.max(0, ((TODAY - minD) / span) * 100));
  const rows = f.map(t => {
    const s = new Date(t.start), e = new Date(t.end);
    const l = Math.max(0, ((s - minD) / span) * 100), w = Math.max(0.5, ((e - s) / span) * 100);
    const es = effStatus(t), gc = es === 'Complete' ? 'g-done' : es === 'Overdue' ? 'g-over' : es === 'In Progress' ? 'g-in' : 'g-not';
    return `<tr onclick="openTask(${t.id})"><td style="width:26px;color:var(--text3)">${t.id}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.task}</td><td><span class="av ${t.owner==='Diana'?'av-d':'av-j'}" style="font-size:9px">${t.owner[0]}</span></td><td><div class="gtrack"><div class="gbar ${gc}" style="left:${l.toFixed(1)}%;width:${w.toFixed(1)}%"></div><div class="g-today" style="left:${tp.toFixed(1)}%"></div></div></td></tr>`;
  }).join('');
  document.getElementById('gantt-view').innerHTML = `<div class="gantt-wrap"><table class="gt"><thead><tr><th>#</th><th>Task</th><th></th><th>Timeline → Jan 2028 (red line = today)</th></tr></thead><tbody>${rows}</tbody></table></div>${f.length < getFiltered().length ? '<div style="text-align:center;font-size:11px;color:var(--text3);padding:10px">Showing first 100 — use filters to narrow down</div>' : ''}`;
}

function toggleG(g) { collapsed[g] = !collapsed[g]; render(); }
function setView(v) {
  currentView = v;
  document.getElementById('list-view').style.display = v === 'list' ? 'block' : 'none';
  document.getElementById('gantt-view').style.display = v === 'gantt' ? 'block' : 'none';
  document.getElementById('vl').classList.toggle('active', v === 'list');
  document.getElementById('vg').classList.toggle('active', v === 'gantt');
  render();
}

function openTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('modal-body').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">#${t.id} — ${t.task}</div>
    <div class="modal-sub">${t.group} · ${fmt(t.start)} → ${fmt(t.end)} · ${t.owner}</div>
    <div class="field"><label>Status</label>
      <select id="m-status">
        <option ${t.status==='Not Started'?'selected':''}>Not Started</option>
        <option ${t.status==='In Progress'?'selected':''}>In Progress</option>
        <option ${t.status==='Complete'?'selected':''}>Complete</option>
      </select>
    </div>
    <div class="field"><label>Progress — <span id="pct-lbl">${t.pct}%</span></label>
      <div class="range-wrap">
        <input type="range" min="0" max="100" step="5" value="${t.pct}" id="m-pct" oninput="document.getElementById('pct-lbl').textContent=this.value+'%';document.getElementById('pct-val').textContent=this.value+'%'">
        <span class="range-val" id="pct-val">${t.pct}%</span>
      </div>
    </div>
    <div class="field"><label>Notes</label><textarea id="m-notes">${t.notes||''}</textarea></div>
    <div class="save-status" id="save-status"></div>
    <div class="modal-actions">
      <button class="btn-save" id="btn-save" onclick="doSave(${t.id})">💾 Save for everyone</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function doSave(id) {
  const status = document.getElementById('m-status').value;
  const pct = status === 'Complete' ? 100 : parseInt(document.getElementById('m-pct').value);
  const notes = document.getElementById('m-notes').value;
  saveTask(id, status, pct, notes);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); render(); }
function render() { renderKPIs(); if (currentView === 'list') renderList(); else renderGantt(); }

if (sessionStorage.getItem('auth') === '1') { loadAll(); setInterval(loadAll, 60000); }
</script>
